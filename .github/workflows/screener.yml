name: NSE Daily Screener

on:
  schedule:
    # 10:15 UTC is exactly 15:45 (3:45 PM) IST. Runs Monday to Friday.
    - cron: '15 10 * * 1-5'
  workflow_dispatch: # Allows you to manually trigger it by clicking a button in GitHub

permissions:
  contents: write # Allows the bot to save the updated trading_alerts.json back to your repo

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NSE Scanner
        run: python nse_scanner.py

      - name: Commit and Push updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trading_alerts.json
          # Only commit if the JSON file actually changed (avoids empty commit errors)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update trading alerts [skip ci]" && git push)
